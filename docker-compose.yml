name: market-place

services:
  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: daria
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: payment_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  user-service-postgres:
    image: postgres:15-alpine
    container_name: user-service-postgres
    environment:
      POSTGRES_DB: user_service_postgres
      POSTGRES_USER: daria
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - app-network

  auth-service-postgres:
    image: postgres:15-alpine
    container_name: auth-service-postgres
    environment:
      POSTGRES_DB: auth_service_postgres
      POSTGRES_USER: daria
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - app-network

  order-service-postgres:
    image: postgres:15-alpine
    container_name: order-service-postgres
    environment:
      POSTGRES_DB: order_service_postgres
      POSTGRES_USER: daria
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - app-network

  user-service:
    image: sashevna22/user-service
    container_name: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-service-postgres:5432/user_service_postgres
      SPRING_DATASOURCE_USERNAME: daria
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8080
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - user-service-postgres
      - redis
    networks:
      - app-network

  auth-service:
    image: sashevna22/auth-service
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-postgres:5432/auth_service_postgres
      SPRING_DATASOURCE_USERNAME: daria
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8081
      JWT_ACCESS_SECRET: "ASDIJIUuhHUHUIIUVFfgff134gguYYlloigbVxseqwty"
      JWT_REFRESH_SECRET: "wenuiuweiGUYGYUVHBXWS112jBUIWCIOJBHJIHtdfGygioiHy6d78d"
    ports:
      - "8081:8081"
    depends_on:
      - user-service
      - auth-service-postgres
    networks:
      - app-network

  order-service:
    image: sashevna22/order-service
    container_name: order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-service-postgres:5432/order_service_postgres
      SPRING_DATASOURCE_USERNAME: daria
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8082
      USER_SERVICE_URL: http://user-service:8080
      SERVICE_AUTH_URL: http://auth-service:8081
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8082:8082"
    depends_on:
      - order-service-postgres
    networks:
      - app-network

  payment-service:
    image: sashevna22/payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://daria:password@mongodb:27017/payment_db?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mongodb
    networks:
      - app-network

  api-gateway:
    build: .
    container_name: api-gateway
    environment:
      SERVER_PORT: 8083
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVICE_USER: http://user-service:8080
      SERVICE_AUTH: http://auth-service:8081
      SERVICE_ORDER: http://order-service:8082
      SERVICE_PAYMENT: http://payment-service:8084
      SECURITY_JWT_AUTH_HEADER: "Authorization"
      SECURITY_JWT_BEARER_PREFIX: "Bearer "
      SECURITY_JWT_ACCESS_SECRET: "ASDIJIUuhHUHUIIUVFfgff134gguYYlloigbVxseqwty"
      SECURITY_JWT_ACCESS_LIFETIME: "600000"
      SECURITY_JWT_REFRESH_SECRET: "wenuiuweiGUYGYUVHBXWS112jBUIWCIOJBHJIHtdfGygioiHy6d78d"
      SECURITY_JWT_REFRESH_LIFETIME: "86400000"
      SECURITY_JWT_IGNORED_PATHS: "/authorization/login,/authorization/registration,/authorization/refresh-tokens,/authorization/logout"
    ports:
      - "8083:8083"
    depends_on:
      - redis
      - zookeeper
      - kafka
      - user-service
      - auth-service
      - order-service
      - payment-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  user_db_data:
  auth_db_data:
  order_db_data: