spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/users/**
          filters:
            - name: JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: userService
                fallbackUri: forward:/fallback/user-service

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/authorization/**
          filters:
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth-service

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/order/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

security:
  jwt:
    auth-header: "Authorization"
    bearer-prefix: "Bearer "
    access-secret: "ASDIJIUuhHUHUIIUVFfgff134gguYYlloigbVxseqwty"
    access-lifetime: 600000
    refresh-secret: "wenuiuweiGUYGYUVHBXWS112jBUIWCIOJBHJIHtdfGygioiHy6d78d"
    refresh-lifetime: 86400000
    ignored-paths:
      - "/authorization/login"
      - "/authorization/registration"
      - "/authorization/refresh-tokens"
      - "/authorization/logout"

server:
  port: 8083

service:
  user:
    url: http://user-service:8080
  auth:
    url: http://auth-service:8081
  order:
    url: http://order-service:8082
